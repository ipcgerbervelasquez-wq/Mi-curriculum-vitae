<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoElite | Concesionaria Premium Guatemala</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f4f4f4; color: #333; line-height: 1.6; }

        /* NAVEGACIÓN */
        nav {
            background-color: #1a1a1a; color: white; padding: 0 5%;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000; height: 70px;
        }
        nav h1 { color: #e74c3c; font-size: 1.6rem; letter-spacing: 1px; }
        nav h1 span { color: white; }

        .menu-toggle { 
            display: none; 
            flex-direction: column; 
            cursor: pointer; 
            gap: 5px; 
        }
        .menu-toggle span { 
            display: block; width: 28px; height: 3px; 
            background: white; border-radius: 3px; transition: all 0.3s; 
        }

        .nav-links { 
            display: flex; list-style: none; align-items: center; 
        }
        .nav-links li { margin-left: 25px; }
        .nav-links li a { 
            color: white; text-decoration: none; 
            transition: 0.3s; font-weight: 500; 
        }
        .nav-links li a:hover { color: #e74c3c; }

        /* HERO */
        .hero {
            position: relative; height: 55vh; min-height: 400px; display: flex;
            justify-content: center; align-items: center; color: white;
            text-align: center; overflow: hidden;
        }
        .hero-video {
            position: absolute; top: 50%; left: 50%; min-width: 100%; min-height: 100%;
            transform: translate(-50%, -50%); object-fit: cover; 
            filter: brightness(0.45); z-index: -1;
        }
        .hero-content h2 { 
            font-size: clamp(2rem, 6vw, 3.2rem); 
            margin-bottom: 10px; 
        }
        .hero-content p { font-size: clamp(1.1rem, 3vw, 1.4rem); }

        /* CONTENIDO PRINCIPAL */
        .container { 
            padding: 60px 5%; max-width: 1400px; margin: 0 auto; 
        }
        .section-title { 
            text-align: center; margin-bottom: 50px; 
            font-size: clamp(1.8rem, 4vw, 2.4rem); 
            position: relative; padding-bottom: 15px; 
        }
        .section-title::after { 
            content: ''; width: 80px; height: 4px; background: #e74c3c; 
            position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); 
        }

        .car-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 25px; 
        }
        .car-card { 
            background: white; border-radius: 15px; overflow: hidden; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.1); transition: 0.3s; 
        }
        .car-card:hover { transform: translateY(-8px); }
        .car-card img { 
            width: 100%; height: 200px; object-fit: cover; 
        }
        .car-info { padding: 20px; }
        .price { 
            color: #e74c3c; font-weight: 800; font-size: 1.4rem; 
            display: block; margin-bottom: 12px; 
        }
        .btn-view {
            display: block; background-color: #1a1a1a; color: white; 
            padding: 12px; border-radius: 8px; text-align: center; 
            font-weight: 600; cursor: pointer; border: none; width: 100%; 
            transition: 0.3s;
        }
        .btn-view:hover { background-color: #e74c3c; }

        /* MODALES */
        .modal {
            display: none; position: fixed; z-index: 2000;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
        }
        .modal-content {
            background-color: white; margin: 5% auto; padding: 25px;
            width: 90%; max-width: 580px; border-radius: 15px; 
            position: relative; max-height: 90vh; overflow-y: auto;
        }
        .close { 
            position: absolute; right: 20px; top: 15px; 
            font-size: 32px; cursor: pointer; color: #333; 
        }
        .modal-body img { 
            width: 100%; border-radius: 10px; margin-bottom: 20px; 
            height: 220px; object-fit: cover; 
        }

        footer { 
            background: #1a1a1a; color: white; 
            text-align: center; padding: 40px 20px; margin-top: 60px; 
        }

        /* ==================== RESPONSIVE ==================== */
        @media (max-width: 768px) {
            .menu-toggle { display: flex; }
            
            .nav-links {
                position: fixed; top: 70px; right: -100%;
                background-color: #1a1a1a; width: 85%; max-width: 300px;
                height: calc(100vh - 70px); flex-direction: column;
                justify-content: start; padding-top: 40px;
                transition: all 0.4s ease; box-shadow: -5px 0 15px rgba(0,0,0,0.4);
            }
            .nav-links.active { right: 0; }
            .nav-links li { margin: 18px 0; font-size: 1.1rem; }

            .car-grid {
                grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
                gap: 20px;
            }
            .car-card img { height: 180px; }
        }

        @media (max-width: 480px) {
            .container { padding: 40px 5%; }
            nav h1 { font-size: 1.35rem; }
            .hero { height: 50vh; min-height: 320px; }
        }
    </style>
</head>
<body>

    <nav>
        <h1>AUTO<span>ELITE</span></h1>
        <div class="menu-toggle" id="mobile-menu">
            <span></span><span></span><span></span>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Inicio</a></li>
            <li><a href="Inventario.html">Inventario</a></li>
            <li><a href="Financiamiento.html">Financiamiento</a></li>
            <li><a href="Contactos.html">Contacto</a></li>
        </ul>
    </nav>

    <header class="hero">
        <video autoplay muted loop playsinline class="hero-video">
            <source src="logo de Auroch/Logo de Auruch.mp4" type="video/mp4">
        </video>
        <div class="hero-content">
            <h2>Catálogo Exclusive 2026</h2>
            <p>Excelencia automotriz en toda Guatemala</p>
        </div>
    </header>

    <div class="container">
        <h2 class="section-title">Nuestros Modelos Elite Disponibles</h2>
        <div class="car-grid" id="main-grid"></div>
    </div>

    <div id="modals-container"></div>

    <footer>
        <p>&copy; 2026 AutoElite Guatemala. Precios sujetos a cambios.</p>
    </footer>

    <script>
        let vehicles = [];

        function loadVehicles() {
            const saved = localStorage.getItem('vehicles');
            if (saved) {
                vehicles = JSON.parse(saved);
            } else {
                vehicles = [ /* ... mismos 15 vehículos que te di antes ... */ ];
                localStorage.setItem('vehicles', JSON.stringify(vehicles));
            }
        }

        function renderCatalog() {
            const grid = document.getElementById('main-grid');
            const disponibles = vehicles.filter(v => v.status === "disponible");

            grid.innerHTML = disponibles.map(m => `
                <div class="car-card">
                    <img src="${m.img}" alt="${m.name}">
                    <div class="car-info">
                        <h3>${m.name}</h3>
                        <span class="price">${m.price}</span>
                        <button class="btn-view" onclick="openModal('modal${m.id}')">Ver Detalles</button>
                    </div>
                </div>
            `).join('');

            const modalContainer = document.getElementById('modals-container');
            modalContainer.innerHTML = disponibles.map(m => `
                <div id="modal${m.id}" class="modal">
                    <div class="modal-content">
                        <span class="close" onclick="closeModal('modal${m.id}')">&times;</span>
                        <div class="modal-body">
                            <img src="${m.img}" alt="${m.name}">
                            <h3>Detalles: ${m.name}</h3>
                            <ul class="specs-list">
                                ${m.specs.map(s => {
                                    const parts = s.split(':');
                                    return `<li>${parts[0]}: <span>${parts[1] || ''}</span></li>`;
                                }).join('')}
                            </ul>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function openModal(id) {
            document.getElementById(id).style.display = "block";
            document.body.style.overflow = "hidden";
        }
        function closeModal(id) {
            document.getElementById(id).style.display = "none";
            document.body.style.overflow = "auto";
        }
        window.onclick = (e) => { 
            if(e.target.className === 'modal') closeModal(e.target.id); 
        };

        // Menú Hamburguesa
        const menuToggle = document.getElementById('mobile-menu');
        const navLinks = document.querySelector('.nav-links');
        menuToggle.addEventListener('click', () => {
            navLinks.classList.toggle('active');
        });

        // Inicializar
        window.onload = () => {
            loadVehicles();
            renderCatalog();
        };
    </script>
</body>
</html>
